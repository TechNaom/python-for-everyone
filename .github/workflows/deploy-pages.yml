name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create deployment directory
        run: |
          mkdir -p public
          cp -r . public/
          find public -maxdepth 1 -mindepth 1 -type d -name .git -prune -o -exec sh -c 'test -e "$1/.git"' _ {} \; -prune

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          enable_jekyll: false
          force_orphan: true
