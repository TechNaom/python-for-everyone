name: Capstone 1 - Task API CI

on:
  push:
    branches: [main]
    paths:
      - "capstones/capstone-1-task-api/**"
      - ".github/workflows/capstone-1-task-api-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "capstones/capstone-1-task-api/**"
      - ".github/workflows/capstone-1-task-api-ci.yml"

defaults:
  run:
    working-directory: capstones/capstone-1-task-api

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: capstones/capstone-1-task-api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff
        run: ruff check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: capstones/capstone-1-task-api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v
