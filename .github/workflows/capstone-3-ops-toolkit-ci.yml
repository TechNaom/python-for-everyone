name: Capstone 3 - Ops Toolkit CI

on:
  push:
    branches: [main]
    paths:
      - "capstones/capstone-3-ops-toolkit/**"
      - ".github/workflows/capstone-3-ops-toolkit-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "capstones/capstone-3-ops-toolkit/**"
      - ".github/workflows/capstone-3-ops-toolkit-ci.yml"

defaults:
  run:
    working-directory: capstones/capstone-3-ops-toolkit

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python3 -m unittest discover -s tests -v
